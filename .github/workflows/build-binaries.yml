name: Build Desktop Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: "3.14"
            artifact-name: MotecLogGeneratorQt-windows
            artifact-path: dist/MotecLogGeneratorQt.exe
          - os: macos-latest
            python-version: "3.14"
            artifact-name: MotecLogGeneratorQt-macos
            artifact-path: dist/MotecLogGeneratorQt.app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build application
        run: pyinstaller --noconfirm --clean motec_log_generator_qt.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
